    <ellipse cx="285" cy="175" rx="16" ry="11" fill="#1a0a00"/>
    <!-- Snout tip -->
    <path d="M355 115 C368 102 388 98 402 105 C388 99 370 105 360 115Z" fill="#D4A000"/>
