  <!-- Lightning bolt accent -->
  <text x="465" y="185" font-family="Arial" font-size="52" fill="#F5C518">⚡</text>

  <!-- WORDMARK -->
  <text x="490" y="230" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900"
