<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightning Wolves Studio</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ═══ TOAST CONTAINER ═══ -->
<div id="toast-container"></div>

<!-- ═══ SIDEBAR NAV ═══ -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <a href="#/" class="sidebar-logo" title="Lightning Wolves Studio">
      <img src="/LightningWolvesLogoTransparentBG.png" alt="LW" />
    </a>
    <a href="#/" class="sidebar-icon" data-page="landing" title="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
    </a>
    <a href="#/crew" class="sidebar-icon" data-page="crew" title="Crew">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>
    </a>
    <a href="#/studio" class="sidebar-icon" data-page="studio" title="Studio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </a>
    <a href="#/pricing" class="sidebar-icon" data-page="pricing" title="Pricing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </a>
    <a href="#/join" class="sidebar-icon" data-page="join" title="Join the Pack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </a>
  </div>
  <div class="sidebar-bottom">
    <div class="sidebar-divider"></div>
    <a href="#/admin" class="sidebar-icon" data-page="admin" title="Admin" id="admin-nav-link" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    </a>
    <a href="#/bug-report" class="sidebar-icon" title="Report Bug" id="bug-report-nav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </a>
  </div>
</nav>

<!-- ═══ TOPBAR ═══ -->
<header class="topbar" id="topbar">
  <div class="topbar-left">
    <span class="breadcrumb">Lightning Wolves Studio <span class="breadcrumb-sep">›</span> <span id="breadcrumb-page">Home</span></span>
  </div>
  <div class="topbar-right">
    <div class="credit-pill" id="credit-pill" title="Lightning Credits">
      <span class="credit-icon">⚡</span>
      <span class="credit-amount" id="credit-amount">0</span>
      <div class="credit-dropdown" id="credit-dropdown">
        <div class="credit-dropdown-title">Lightning Credits</div>
        <div class="credit-breakdown" id="credit-breakdown"></div>
        <a href="#/pricing" class="credit-dropdown-link">Get more →</a>
      </div>
    </div>
    <button class="btn-topbar" id="btn-signin">Sign In</button>
    <button class="btn-topbar btn-topbar-gold" id="btn-signup">Sign Up</button>
  </div>
</header>

<!-- ═══ MAIN CONTENT AREA ═══ -->
<div class="main-content" id="main-content">

  <!-- PAGE: LANDING -->
  <div class="page" id="page-landing"></div>

  <!-- PAGE: CREW -->
  <div class="page hidden" id="page-crew"></div>

  <!-- PAGE: STUDIO -->
  <div class="page hidden" id="page-studio"></div>

  <!-- PAGE: PRICING -->
  <div class="page hidden" id="page-pricing"></div>

  <!-- PAGE: JOIN -->
  <div class="page hidden" id="page-join"></div>

  <!-- PAGE: AUTH -->
  <div class="page hidden" id="page-auth"></div>

  <!-- PAGE: ADMIN -->
  <div class="page hidden" id="page-admin"></div>

</div>

<!-- ═══ MODALS ═══ -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- ═══ BUG REPORT MODAL ═══ -->
<div class="modal-overlay hidden" id="bug-modal-overlay">
  <div class="modal-box bug-modal">
    <div class="modal-header">
      <h3>Report a Bug</h3>
      <button class="modal-close" id="bug-modal-close">&times;</button>
    </div>
    <form id="bug-report-form">
      <div class="field-group">
        <label>Describe the bug *</label>
        <textarea id="bug-description" rows="4" placeholder="What happened? What did you expect?" required></textarea>
      </div>
      <div class="field-group">
        <label>Screenshot (optional)</label>
        <input type="file" id="bug-screenshot" accept="image/*" />
      </div>
      <button type="submit" class="btn-gold btn-full">Submit Report</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/app.js"></script>
</body>
</html>
